<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030311" />
  <meta name="description" content="Cyberpunk večerní deník aktivit – záznamy každého dne" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NightLog" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet" />

  <title>NightLog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ PIN OVERLAY ═══ -->
  <div class="pin-overlay" id="pinOverlay" role="dialog" aria-modal="true" aria-label="Ověření přístupu">
    <div class="pin-box">
      <div class="pin-title">
        <span class="pin-title-slash" aria-hidden="true">//</span>
        <span class="pin-title-text">PŘÍSTUP</span>
        <span class="pin-title-slash" aria-hidden="true">//</span>
      </div>
      <p class="pin-subtitle">ZADEJTE KÓD</p>
      <div class="pin-digits" id="pinDigits" role="group" aria-label="Číslice PINu">
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 1" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 2" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 3" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 4" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 5" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 6" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 7" />
        <input class="pin-digit" type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" autocomplete="off" aria-label="Číslice 8" />
      </div>
      <p class="pin-error" id="pinError" aria-live="assertive"></p>
    </div>
  </div>

  <!-- ═══ SETUP OVERLAY ═══ -->
  <div class="pin-overlay" id="setupOverlay" role="dialog" aria-modal="true" aria-label="Nastavení přístupu k datům" style="display:none">
    <div class="pin-box">
      <div class="pin-title">
        <span class="pin-title-slash" aria-hidden="true">//</span>
        <span class="pin-title-text">SETUP</span>
        <span class="pin-title-slash" aria-hidden="true">//</span>
      </div>
      <p class="pin-subtitle">PRVNÍ SPUŠTĚNÍ NA TOMTO ZAŘÍZENÍ</p>
      <p class="setup-desc">Vlož GitHub Access Token pro synchronizaci dat:</p>
      <input class="setup-pat-input" id="setupPatInput" type="password" placeholder="ghp_..." autocomplete="off" spellcheck="false" />
      <button class="setup-save-btn" id="setupSaveBtn">ULOŽIT</button>
      <p class="pin-error" id="setupError" aria-live="assertive"></p>
    </div>
  </div>

  <!-- ═══ LOADING OVERLAY ═══ -->
  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true" role="status" aria-label="Načítání dat">
    <div class="loading-box">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-text">SYNCHRONIZACE DAT</p>
      <p class="loading-sub" id="loadingStatus">PŘIPOJOVÁNÍ KE GIST...</p>
    </div>
  </div>

  <!-- CRT overlay -->
  <div class="scanlines" aria-hidden="true"></div>

  <div id="scrollWrap">
  <div class="container">

    <!-- ═══ HEADER ═══ -->
    <header class="app-header">
      <h1 class="app-title">
        <span class="title-slash" aria-hidden="true">//</span>
        <span class="title-main" data-text="NIGHTLOG">NIGHTLOG</span>
        <span class="title-slash" aria-hidden="true">//</span>
      </h1>
      <p class="app-date" id="currentDate" aria-live="polite"></p>
    </header>

    <!-- ═══ SCORE / CHART ═══ -->
    <section class="panel score-section" aria-label="Přehled aktivit">
      <div class="panel-corner tl"></div>
      <div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div>
      <div class="panel-corner br"></div>

      <div class="stats-filter" role="group" aria-label="Filtr statistik">
        <button class="stats-filter-btn" data-filter="chris">CHRIS</button>
        <button class="stats-filter-btn active" data-filter="all">ALL</button>
        <button class="stats-filter-btn" data-filter="kata">KÁŤA</button>
      </div>

      <div class="chart-wrap">
        <svg
          id="scoreChart"
          viewBox="0 0 200 200"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Donut graf zastoupení aktivit"
        >
          <!-- Rendered by JS -->
        </svg>
        <div class="chart-center" aria-hidden="true">
          <span class="chart-label">ZÁZNAMY</span>
          <span class="chart-number" id="totalCount">0</span>
        </div>
      </div>

      <ul class="score-legend" id="scoreLegend" aria-label="Legenda aktivit">
        <!-- Rendered by JS -->
      </ul>
    </section>

    <!-- ═══ ACTIVITY BUTTONS ═══ -->
    <section class="panel activities-section" aria-label="Výběr aktivity pro dnešní den">
      <div class="panel-corner tl"></div>
      <div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div>
      <div class="panel-corner br"></div>

      <div class="section-label" aria-hidden="true">&gt;&gt; VYBRAT AKTIVITU &lt;&lt;</div>

      <div class="buttons-grid" id="buttonsGrid" role="group" aria-label="Aktivity">
        <!-- Rendered by JS -->
      </div>

      <div class="save-bar" id="saveBar">
        <button class="save-btn" id="saveBtn" type="button" aria-label="Uložit dnešní volbu aktivit">
          ✦ ULOŽIT VOLBU
        </button>
      </div>

      <div class="locked-message" id="lockedMessage" role="status" aria-live="polite">
        <span class="lock-icon" aria-hidden="true">⬡</span>
        <span id="lockText"></span>
      </div>
    </section>

    <!-- ═══ CALENDAR ═══ -->
    <section class="panel calendar-section" aria-label="Kalendář historie aktivit">
      <div class="panel-corner tl"></div>
      <div class="panel-corner tr"></div>
      <div class="panel-corner bl"></div>
      <div class="panel-corner br"></div>

      <div class="calendar-nav">
        <button class="cal-nav-btn" id="prevMonth" aria-label="Předchozí měsíc">&#9664;</button>
        <span class="calendar-title" id="calendarTitle"></span>
        <button class="cal-nav-btn" id="nextMonth" aria-label="Následující měsíc">&#9654;</button>
      </div>

      <div class="calendar-weekdays" aria-hidden="true">
        <span>Po</span><span>Út</span><span>St</span><span>Čt</span>
        <span>Pá</span><span>So</span><span>Ne</span>
      </div>

      <div class="calendar-grid" id="calendarGrid" role="grid" aria-label="Dny v měsíci">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ═══ RESET ═══ -->
    <div class="reset-section">
      <button class="reset-btn" id="resetTodayBtn" type="button" aria-label="Resetovat dnešní záznam">
        ↺ RESET DNE
      </button>
    </div>

    <!-- ═══ THEME TOGGLE ═══ -->
    <div class="theme-toggle" role="group" aria-label="Přepnutí vzhledu">
      <button class="theme-btn" data-theme="day"   aria-label="Denní režim">☀</button>
      <button class="theme-btn active" data-theme="auto"  aria-label="Automatický režim">AUTO</button>
      <button class="theme-btn" data-theme="night" aria-label="Noční režim">☽</button>
    </div>

  </div><!-- /.container -->
  </div><!-- /#scrollWrap -->

  <!-- ═══ DAY EDITOR MODAL ═══ -->
  <div class="day-modal-overlay" id="dayModalOverlay" aria-hidden="true">
    <div class="day-modal" role="dialog" aria-modal="true" aria-labelledby="dayModalDate">
      <div class="day-modal-header">
        <span class="day-modal-date" id="dayModalDate"></span>
        <button class="day-modal-close" id="dayModalClose" type="button" aria-label="Zavřít">✕</button>
      </div>
      <div class="section-label">&gt;&gt; UPRAVIT DEN &lt;&lt;</div>
      <div class="buttons-grid" id="dayModalGrid" role="group" aria-label="Aktivity pro vybraný den">
        <!-- Rendered by JS -->
      </div>
      <div class="day-modal-actions">
        <button class="day-delete-btn" id="dayModalDelete" type="button">↺ SMAZAT</button>
        <button class="day-cancel-btn" id="dayModalCancel" type="button">ZRUŠIT</button>
        <button class="save-btn" id="dayModalSave" type="button">✦ ULOŽIT</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
